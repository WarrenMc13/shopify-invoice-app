services:
  - type: web
    name: shopify-invoice-app
    runtime: node
    buildCommand: npm install && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shopify-invoice-db
          property: connectionString
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: shopify-invoice-db
    databaseName: shopify_invoice
    user: shopify_invoice
